<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrospectiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #121212; /* Preto Spotify */
    --surface: #181818;
    --surface2: #282828;
    --spotify-green: #1DB954;
    --spotify-green-hover: #1ed760;
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --text2: #b3b3b3;
    --radius: 8px;
    --radius-lg: 12px;
    
    /* Cores vibrantes estilo Wrapped */
    --wrapped-pink: #ff4b91;
    --wrapped-yellow: #ffcd38;
    --wrapped-orange: #ff763b;
    --wrapped-blue: #1d75ff;
  }
  
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
  
  /* Utilitários baseados em tipografia Spotify */
  h1, h2, h3, .spotify-font { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: -0.03em; }

  .screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.03) translateY(20px); }
 
  /* Loading screen */
  #loading-screen { background: #000; flex-direction: column; gap: 20px; }
  .spotify-loader { width: 50px; height: 50px; border: 4px solid var(--surface2); border-top-color: var(--spotify-green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 14px; color: var(--text2); font-weight: 500; }
 
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--wrapped-blue); border-radius: 4px; padding: 12px 24px; font-size: 14px; font-weight: bold; color: white; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
  /* Invite screen */
  #invite-screen { background: linear-gradient(135deg, #1e0034 0%, #000000 100%); flex-direction: column; }
  .invite-card { background: transparent; text-align: center; width: 440px; max-width: 90vw; padding: 20px; }
  .wrapped-badge { display: inline-block; background: var(--spotify-green); color: #000; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 16px; letter-spacing: 0.1em; }
  .invite-title { font-size: 42px; line-height: 1.1; margin-bottom: 16px; text-transform: uppercase; color: var(--wrapped-yellow); }
  .invite-subtitle { font-size: 16px; color: var(--text2); margin-bottom: 32px; font-weight: 400; line-height: 1.5; }
  .invite-input { width: 100%; background: var(--surface2); border: 2px solid transparent; border-radius: 50px; padding: 16px 24px; font-size: 16px; font-weight: 600; color: var(--text); text-align: center; outline: none; transition: all 0.2s; margin-bottom: 16px; }
  .invite-input:focus { border-color: white; background: #333; }
  .invite-input.error { border-color: var(--wrapped-pink); animation: shake 0.35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .spotify-btn { width: 100%; background: var(--spotify-green); border: none; border-radius: 50px; padding: 16px; font-size: 16px; font-weight: 700; color: #000; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em; }
  .spotify-btn:hover { background: var(--spotify-green-hover); transform: scale(1.03); }
  .spotify-btn:active { transform: scale(0.99); }
  .invite-footer { font-size: 13px; color: var(--text2); margin-top: 32px; }
 
  /* Admin Dashboard */
  #admin-screen { background: #121212; align-items: flex-start; overflow-y: auto; }
  .admin-wrap { width: 850px; max-width: 96vw; padding: 40px 20px; margin: 0 auto; }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  .admin-logo { font-size: 24px; color: #fff; }
  .admin-logo span { color: var(--spotify-green); }
  .admin-section { margin-bottom: 40px; }
  .admin-section-title { font-size: 18px; color: #fff; margin-bottom: 16px; border-left: 4px solid var(--spotify-green); padding-left: 10px; }
  .admin-card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; }
  .invite-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .invite-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--surface2); border-radius: var(--radius); transition: background 0.2s; }
  .invite-item:hover { background: #333; }
  .invite-code { font-weight: 700; color: var(--spotify-green); }
  .btn-delete { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 14px; font-weight: bold; }
  
  .add-invite-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .add-invite-row input, .admin-card input[type="text"], .admin-card input[type="date"] { flex: 1; min-width: 150px; background: var(--surface2); border: 1px solid transparent; border-radius: 4px; padding: 12px; color: #fff; outline: none; font-family: inherit; }
  .add-invite-row input:focus, .admin-card input:focus { border-color: var(--text2); }
  
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 16px; }
  .photo-thumb-wrap { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: #000; }
  .photo-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .photo-thumb-wrap:hover .photo-thumb-overlay { opacity: 1; }
  .photo-thumb-overlay button { background: #ff4b91; border: none; color: white; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }

  /* Elementos de Input customizados no painel */
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 600px){ .config-grid { grid-template-columns: 1fr; } }
  .input-block { display: flex; flex-direction: column; gap: 6px; }
  .input-block label { font-size: 13px; color: var(--text2); font-weight: 600; }
  .admin-card textarea { background: var(--surface2); border: none; border-radius: 4px; padding: 12px; color: white; height: 80px; resize: none; font-family: inherit; outline: none; }

  /* Spotify Player Screen */
  #player-screen { background: #121212; flex-direction: column; justify-content: space-between; padding: 20px; }
  .player-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; height: 100%; justify-content: space-between; position: relative; }
  
  /* Barra superior estilo Stories/Spotify */
  .story-progress-container { display: flex; gap: 4px; width: 100%; padding: 10px 0; }
  .story-bar-bg { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  .story-bar-fill { height: 100%; width: 0%; background: #fff; }

  .player-header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 5px; }
  .context-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2); font-weight: 700; }
  
  /* Álbum / Foto */
  .center-content-box { position: relative; width: 100%; aspect-ratio: 1; background: #282828; border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,0.6); margin: 20px 0; display: flex; align-items: center; justify-content: center; }
  .spotify-art { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; transition: opacity 0.3s ease; }
  
  /* Widget Especial: Contador de Relacionamento (Visual de estatística do Wrapped) */
  .wrapped-counter-widget { position: absolute; inset: 0; background: linear-gradient(180deg, var(--wrapped-pink) 0%, #4a0e4e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; color: white; z-index: 2; box-sizing: border-box; }
  .counter-badge { background: #fff; color: #000; font-size: 12px; font-weight: 900; padding: 4px 12px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase; }
  .counter-big-text { font-size: 46px; line-height: 1; color: var(--wrapped-yellow); margin-bottom: 12px; text-transform: uppercase; }
  .counter-sub { font-size: 16px; font-weight: 500; color: #fff; line-height: 1.4;
